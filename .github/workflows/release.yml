name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 3.4) — must already be bumped in ping_widget.py'
        required: true
        type: string
      notes:
        description: 'Release notes (markdown). What changed in this version.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Tag and push
        shell: bash
        run: |
          git config user.name  "mohammad-rj"
          git config user.email "dev@epid.co"
          git tag "v${{ github.event.inputs.version }}"
          git push --tags

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller PingWidget.spec

      - name: Zip release
        shell: bash
        run: |
          cd dist
          powershell Compress-Archive -Path PingWidget -DestinationPath "PingWidget-v${{ github.event.inputs.version }}.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          files: dist/PingWidget-v${{ github.event.inputs.version }}.zip
          body: ${{ github.event.inputs.notes }}
          generate_release_notes: ${{ github.event.inputs.notes == '' }}
